name: SimpleRanksDiscordSync
version: ${project.version}
main: nl.simplesync.SimpleRanksDiscordSync
api-version: '1.20'
author: SimpleSync
softdepend: [SimpleRanks]
commands:
  discordlink:
    description: Koppel je Discord account (automatisch via DM)
    usage: /discordlink
    permission: simpleranks.discord.link
  discordunlink:
    description: Ontkoppel je Discord account
    usage: /discordunlink
    permission: simpleranks.discord.unlink
  syncranks:
    description: Forceer rank synchronisatie
    usage: /syncranks [speler]
    permission: simpleranks.discord.admin
  claimkey:
    description: Claim je maandelijkse rank reward
    usage: /claimkey
    permission: simpleranks.discord.claim
  admindm:
    description: Admin koppel een speler handmatig
    usage: /admindm <speler> <@discorduser>
    permission: simpleranks.discord.admin
permissions:
  simpleranks.discord.link:
    default: true
  simpleranks.discord.unlink:
    default: true
  simpleranks.discord.claim:
    default: true
  simpleranks.discord.admin:
    default: op
